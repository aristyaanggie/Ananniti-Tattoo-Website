<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2416;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b8a0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="highlight" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background gradient -->
  <rect width="800" height="600" fill="url(#heroGradient)"/>
  
  <!-- Highlight overlay -->
  <rect width="800" height="600" fill="url(#highlight)"/>
  
  <!-- Subtle pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="50" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="700" cy="500" r="75" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="400" cy="300" r="100" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Placeholder text -->
  <text x="400" y="250" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.3">
    Premium Tattoo
  </text>
  <text x="400" y="320" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.3">
    Photography
  </text>
  <text x="400" y="400" font-family="Inter, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.2">
    Replace with actual tattoo artwork
  </text>
</svg>