<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333333"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg)"/>
  
  <!-- Subtle texture lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="800" x2="800" y2="800" stroke="#222222" stroke-width="0.5"/>
  
  <!-- Figure silhouette - head -->
  <circle cx="400" cy="280" r="70" fill="none" stroke="#444444" stroke-width="1.5"/>
  <circle cx="400" cy="260" r="25" fill="#333333"/>
  
  <!-- Figure silhouette - shoulders/body -->
  <path d="M320 360 Q400 320 480 360 L500 500 L300 500 Z" fill="none" stroke="#444444" stroke-width="1"/>
  
  <!-- Figure silhouette - arms -->
  <path d="M300 400 Q280 450 320 500" fill="none" stroke="#444444" stroke-width="1"/>
  <path d="M500 400 Q520 450 480 500" fill="none" stroke="#444444" stroke-width="1"/>
  
  <!-- Tattoo elements on arm -->
  <circle cx="340" cy="440" r="15" fill="none" stroke="#555555" stroke-width="0.8"/>
  <path d="M330 440 L350 440 M340 430 L340 450" stroke="#555555" stroke-width="0.5"/>
  
  <!-- Light beam effect -->
  <ellipse cx="400" cy="200" rx="200" ry="50" fill="url(#light)" opacity="0.3"/>
  
  <!-- Text -->
  <text x="400" y="700" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#666666" text-anchor="middle" font-weight="600">Featured Artist</text>
  <text x="400" y="740" font-family="Inter, sans-serif" font-size="14" fill="#444444" text-anchor="middle">Ananniti Tattoo Bali</text>
  
  <!-- Bottom text -->
  <text x="400" y="950" font-family="Inter, sans-serif" font-size="11" fill="#333333" text-anchor="middle">Replace with actual artist photograph</text>
</svg>